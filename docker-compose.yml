version: '3.8'

services:
  # MailJaeger Application
  mailjaeger:
    build: .
    container_name: mailjaeger-app
    ports:
      # Bind to localhost by default for security
      # Change to "8000:8000" to expose externally (ensure API_KEY is set!)
      - "127.0.0.1:8000:8000"
    environment:
      # SECURITY: Set API_KEY for authentication
      # Generate with: python -c 'import secrets; print(secrets.token_urlsafe(32))'
      - API_KEY=${API_KEY:-}
      
      # Server Configuration
      - SERVER_HOST=0.0.0.0  # Inside container, bind to all interfaces
      - SERVER_PORT=8000
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:8000,http://127.0.0.1:8000}
      
      # IMAP Configuration
      - IMAP_HOST=${IMAP_HOST}
      - IMAP_PORT=${IMAP_PORT:-993}
      - IMAP_USERNAME=${IMAP_USERNAME}
      - IMAP_PASSWORD=${IMAP_PASSWORD}
      - IMAP_SSL_VERIFY=${IMAP_SSL_VERIFY:-true}
      
      # AI Configuration - uses host Ollama instance (not a Docker container)
      # host.docker.internal resolves to the host machine from inside the container
      - AI_ENDPOINT=${AI_ENDPOINT:-http://host.docker.internal:11434}
      - AI_MODEL=${AI_MODEL:-mistral-small3.1}
      - AI_TIMEOUT=${AI_TIMEOUT:-120}
      
      # Database
      - DATABASE_URL=sqlite:///./data/mailjaeger.db
      
      # Processing
      - SPAM_THRESHOLD=${SPAM_THRESHOLD:-0.7}
      - MAX_EMAILS_PER_RUN=${MAX_EMAILS_PER_RUN:-200}
      
      # Resource Budget Controls
      - MAX_EMAILS_PER_BATCH=${MAX_EMAILS_PER_BATCH:-50}
      - MAX_RUNTIME_MINUTES=${MAX_RUNTIME_MINUTES:-30}
      - MAX_LLM_CALLS_PER_RUN=${MAX_LLM_CALLS_PER_RUN:-100}
      - MAX_PARALLEL_TASKS=${MAX_PARALLEL_TASKS:-1}
      
      # Mail Action Safety
      - SAFE_MODE=${SAFE_MODE:-true}
      - MARK_AS_READ=${MARK_AS_READ:-false}
      - DELETE_SPAM=${DELETE_SPAM:-false}
      - QUARANTINE_FOLDER=${QUARANTINE_FOLDER:-Quarantine}
      
      # Scheduling
      - SCHEDULE_TIME=${SCHEDULE_TIME:-02:00}
      - SCHEDULE_TIMEZONE=${SCHEDULE_TIMEZONE:-Europe/Berlin}
      
      # Learning
      - LEARNING_ENABLED=${LEARNING_ENABLED:-true}
      - LEARNING_CONFIDENCE_THRESHOLD=${LEARNING_CONFIDENCE_THRESHOLD:-0.8}
      
      # Storage
      - STORE_EMAIL_BODY=${STORE_EMAIL_BODY:-false}
      - STORE_ATTACHMENTS=${STORE_ATTACHMENTS:-false}
      
      # Logging
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - DEBUG=${DEBUG:-false}
    
    extra_hosts:
      # Allows the container to reach the host machine's Ollama instance
      - "host.docker.internal:host-gateway"
    
    volumes:
      - mailjaeger_data:/app/data
      # Custom CA certificates for local TLS interception (e.g. corporate antivirus).
      # Place *.crt or *.pem files in the ./certs/ directory; they are imported
      # automatically at container startup via scripts/entrypoint.sh.
      # The directory is present in the repo (certs/.gitkeep) and is safe to leave
      # empty â€” startup succeeds with no certs present.
      - ./certs:/app/certs:ro
      # Optional: Mount .env file for secrets (alternative to environment variables)
      # - ./.env:/app/.env:ro
    
    restart: unless-stopped
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    
    # NOTE: The user directive is intentionally omitted here.
    # Hardcoding a UID:GID (e.g. "1000:1000") causes permission errors on macOS
    # and many Linux volume setups.  The container runs as root inside its own
    # namespace, which is safe because the data volume is private.
    # Linux users who need a non-root container user can override per-environment:
    #   user: "${UID}:${GID}"
    # (in a docker-compose.override.yml file)

volumes:
  mailjaeger_data:
    driver: local
